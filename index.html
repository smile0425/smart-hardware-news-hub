<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能硬件新闻中心</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="site-title">⚡ 智能硬件新闻中心</h1>
        <p class="site-subtitle">汇聚最新智能硬件资讯</p>
      </div>
      <div class="sync-time" id="syncTime"></div>
    </div>
  </header>

  <main class="main-content">
    <section class="search-section">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="search" id="searchInput" class="search-input"
          placeholder="搜索新闻标题或内容..." aria-label="搜索新闻">
        <button id="aiSearchBtn" class="ai-search-btn">🤖 AI搜索</button>
      </div>
      <div class="ai-answer-box" id="aiAnswerBox" hidden>
        <div class="ai-answer-header">
          <span>🤖 Kimi AI 回答</span>
          <button class="ai-close-btn" id="aiCloseBtn">✕</button>
        </div>
        <div class="ai-answer-content" id="aiAnswerContent"></div>
      </div>
    </section>

    <nav class="category-filter">
      <ul class="category-list" id="categoryList"></ul>
    </nav>

    <section class="news-section">
      <div class="news-list" id="newsGrid"></div>
      <div class="empty-state" id="emptyState" hidden>
        <div class="empty-icon">📭</div>
        <p class="empty-text">没有找到相关新闻</p>
        <p class="empty-hint">试试其他关键词或分类</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>AI智能硬件新闻中心 · 数据每日自动更新</p>
  </footer>

  <script src="js/data.js"></script>
  <script>
    // ===== 状态 =====
    let allNews = [];
    let currentCategory = 'all';
    let currentKeyword = '';

    const CATEGORY_MAP = {
      'all': '全部', 'smart-glasses': '智能眼镜', 'ai-phone': 'AI手机',
      'smart-watch': '智能手表', 'ai-pc': 'AI PC', 'other': '其他'
    };
    const CATEGORY_ICONS = {
      'all': '📰', 'smart-glasses': '👓', 'ai-phone': '📱',
      'smart-watch': '⌚', 'ai-pc': '💻', 'other': '🔮'
    };

    const newsGrid = document.getElementById('newsGrid');
    const emptyState = document.getElementById('emptyState');
    const categoryList = document.getElementById('categoryList');
    const searchInput = document.getElementById('searchInput');
    const aiSearchBtn = document.getElementById('aiSearchBtn');
    const aiAnswerBox = document.getElementById('aiAnswerBox');
    const aiAnswerContent = document.getElementById('aiAnswerContent');
    const aiCloseBtn = document.getElementById('aiCloseBtn');

    // ===== 渲染新闻卡片 =====
    function renderNewsCards(list) {
      if (!list || list.length === 0) {
        newsGrid.innerHTML = '';
        emptyState.hidden = false;
        return;
      }
      emptyState.hidden = true;
      newsGrid.innerHTML = list.map(item => {
        const label = CATEGORY_MAP[item.category] || item.category;
        const icon = CATEGORY_ICONS[item.category] || '📰';
        return `
          <article class="news-card" data-id="${item.id}">
            <div class="card-main">
              <div class="card-category">
                <span class="tag" data-category="${item.category}">${icon} ${label}</span>
                <time>${item.date}</time>
              </div>
              <h2 class="card-title">${item.title}</h2>
              <p class="card-summary">${item.summary}</p>
              <div class="card-content" hidden>${item.content}</div>
            </div>
            <div class="card-footer">
              <button class="expand-btn" aria-expanded="false">展开详情 ▾</button>
              <div class="card-meta">
                <span class="card-source">${item.source}</span>
                ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener" class="source-link">查看原文 ↗</a>` : ''}
              </div>
            </div>
          </article>`;
      }).join('');

      newsGrid.querySelectorAll('.news-card').forEach(card => {
        card.querySelector('.expand-btn').addEventListener('click', e => {
          e.stopPropagation();
          toggleExpand(card);
        });
      });
    }

    function toggleExpand(card) {
      const expanded = card.classList.toggle('expanded');
      const btn = card.querySelector('.expand-btn');
      const summary = card.querySelector('.card-summary');
      const content = card.querySelector('.card-content');
      btn.textContent = expanded ? '收起 ▴' : '展开详情 ▾';
      btn.setAttribute('aria-expanded', expanded);
      if (expanded) {
        summary.textContent = content.textContent;
      } else {
        const id = Number(card.dataset.id);
        const item = allNews.find(n => n.id === id);
        if (item) summary.textContent = item.summary;
      }
    }

    // ===== 分类 =====
    function renderCategories() {
      categoryList.innerHTML = Object.entries(CATEGORY_MAP).map(([key, label]) => `
        <li><button class="cat-btn${key === currentCategory ? ' active' : ''}"
          data-category="${key}">${CATEGORY_ICONS[key] || ''} ${label}</button></li>
      `).join('');
      categoryList.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentCategory = btn.dataset.category;
          categoryList.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
          applyFilters();
        });
      });
    }

    // ===== 搜索 =====
    function searchNews(news, kw) {
      if (!kw || !kw.trim()) return news;
      const q = kw.trim().toLowerCase();
      return news.filter(n => n.title.toLowerCase().includes(q) || n.summary.toLowerCase().includes(q));
    }

    function debounce(fn, ms) {
      let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
    }

    function applyFilters() {
      let r = NewsData.sortByDate([...allNews]);
      r = NewsData.filterByCategory(r, currentCategory);
      r = searchNews(r, currentKeyword);
      renderNewsCards(r);
    }

    // ===== AI 搜索 =====
    async function aiSearch(query) {
      if (!query || !query.trim()) return;
      aiAnswerBox.hidden = false;
      aiAnswerContent.textContent = '正在思考中...';
      aiSearchBtn.disabled = true;
      aiSearchBtn.textContent = '⏳ 搜索中';
      try {
        const resp = await fetch('https://api.moonshot.cn/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer sk-jlxcyz7kGRwjiGqphEGpCdLpDeeEzEDzEPfnD2sHG7hjieWJ'
          },
          body: JSON.stringify({
            model: 'moonshot-v1-8k',
            messages: [
              { role: 'system', content: '你是AI智能硬件新闻中心的搜索助手。请用简洁专业的中文回答，控制在300字以内。' },
              { role: 'user', content: query.trim() }
            ],
            temperature: 0.7, max_tokens: 1024
          })
        });
        const data = await resp.json();
        aiAnswerContent.textContent = data.error
          ? '❌ ' + (data.error.message || 'AI服务暂时不可用')
          : data.choices[0].message.content;
      } catch (e) {
        aiAnswerContent.textContent = '❌ 网络错误，请稍后重试';
      } finally {
        aiSearchBtn.disabled = false;
        aiSearchBtn.textContent = '🤖 AI搜索';
      }
    }

    // ===== 初始化 =====
    async function init() {
      try {
        const result = await NewsData.loadNews();
        allNews = result.news;
        const sorted = NewsData.sortByDate(allNews);
        renderCategories();
        renderNewsCards(sorted);

        // 同步时间
        const syncEl = document.getElementById('syncTime');
        if (result.updatedAt) {
          syncEl.textContent = '🔄 ' + new Date(result.updatedAt).toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'});
        } else if (sorted.length > 0) {
          syncEl.textContent = '🔄 ' + sorted[0].date;
        }

        searchInput.addEventListener('input', debounce(e => { currentKeyword = e.target.value; applyFilters(); }, 300));
        aiSearchBtn.addEventListener('click', () => aiSearch(searchInput.value));
        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); aiSearch(searchInput.value); } });
        aiCloseBtn.addEventListener('click', () => { aiAnswerBox.hidden = true; });
      } catch (err) {
        emptyState.hidden = false;
        emptyState.querySelector('.empty-text').textContent = '加载新闻失败，请稍后重试';
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
